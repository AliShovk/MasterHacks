<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName masterhacks.ru
    ServerAlias www.masterhacks.ru
    DocumentRoot /var/www/masterhacks.ru

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^www\. [NC]
    RewriteRule ^ https://masterhacks.ru%{REQUEST_URI} [R=301,L]

    <Directory /var/www/masterhacks.ru>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    ErrorLog /masterhacks_error.log
    CustomLog /masterhacks_access.log combined

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/masterhacks.ru/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/masterhacks.ru/privkey.pem
</VirtualHost>
</IfModule>
