<VirtualHost *:80>
    ServerName masterhacks.ru
    ServerAlias www.masterhacks.ru
    DocumentRoot /var/www/masterhacks.ru

    <Directory /var/www/masterhacks.ru>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/masterhacks_error.log
    CustomLog ${APACHE_LOG_DIR}/masterhacks_access.log combined
RewriteEngine on
RewriteCond %{SERVER_NAME} =www.masterhacks.ru [OR]
RewriteCond %{SERVER_NAME} =masterhacks.ru
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
